    <script type="module">
      // Konfigurasi untuk update setiap 3 detik dengan akurasi tinggi
      const position = new NXUI.Geolocation({
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 3000  // Cache maksimal 3 detik
      });

      // Setup callbacks untuk tracking real-time
      position
        .onPositionUpdate(data => {
          console.log('=== UPDATE POSISI ===');
          console.log('Waktu:', data.datetime.toLocaleTimeString());
          console.log('Koordinat:', data.coordinates);
          console.log('Akurasi:', Math.round(data.accuracy), 'meter');
          console.log('Kecepatan:', data.speed ? Math.round(data.speed * 3.6) + ' km/h' : 'Tidak tersedia');
          console.log('Arah:', data.heading ? Math.round(data.heading) + '°' : 'Tidak tersedia');
          console.log('Google Maps:', data.googleMapsUrl);
          console.log('------------------------');
          
          // Kirim data ke connection jika ada
          if (typeof connection !== 'undefined' && connection.onStatusData) {
            connection.onStatusData({
              position: data,
              timestamp: data.timestamp,
              coordinates: data.coordinates,
              accuracy: data.accuracy
            });
          }
        })
        .onPositionError(error => {
          console.error('=== ERROR POSISI ===');
          console.error('Tipe:', error.type);
          console.error('Pesan:', error.userMessage);
          console.error('Saran:', error.suggestion);
          console.error('Waktu:', error.datetime.toLocaleTimeString());
          console.error('--------------------');
        });

      // Mulai tracking posisi setiap 3 detik
      console.log('Memulai tracking posisi setiap 3 detik...');
      const watchId = position.watchPosition();

      // Optional: Hentikan tracking setelah 5 menit (300 detik)
      setTimeout(() => {
        position.stopWatching();
        console.log('Tracking posisi dihentikan setelah 5 menit');
      }, 300000);

      // Status monitoring setiap 10 detik
      setInterval(() => {
        const status = position.getStatus();
        if (status.lastPosition) {
          console.log('Status: Tracking aktif, update terakhir:', 
                     status.lastPosition.datetime.toLocaleTimeString());
        }
      }, 10000);
      
    </script>
