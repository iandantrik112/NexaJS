<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Base root: tanpa subfolder deploy; href absolut (/contact/data) tetap ke origin -->
    <base href="/" />
    <title>Nexa</title>
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <header class="site-header" role="banner">
      <div class="site-header__inner">
        <p class="site-header__docs">
          <a href="http://localhost/docs/platform/javascript" target="_blank" id="nav-docs">Dokumentasi platform (JavaScript)</a>
        </p>
        <div class="site-header__cluster">
          <p class="site-header__hint">Contoh tautan:</p>
          <nav class="site-header__nav" aria-label="Navigasi utama">
            <ul class="site-header__links">
              <li><a href="/beranda" id="nav-home">Beranda</a></li>
              <li><a href="/about" id="nav-about">About</a></li>
              <li><a href="/blog" id="nav-blog">Blog</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <!-- Konten route di #main; relatif ke <base href="/"> -->
    <div id="main">
      <div class="main-splash">
        <img
          class="main-splash__icon"
          src="/assets/images/icon.png"
          alt=""
          width="50"
          height="50"
        />
      </div>
    </div>
    <!-- Konten route dimuat di sini; base URL API di App.js (url → NEXA.url) -->

    <script type="module" src="/App.js"></script>
  </body>
</html>
